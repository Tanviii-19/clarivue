<style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f3e8ff 0%, #fae8ff 50%, #fdf2f8 100%);
            min-height: 100vh;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .scroll-container::-webkit-scrollbar { width: 6px; }
        .scroll-container::-webkit-scrollbar-track { background: transparent; }
        .scroll-container::-webkit-scrollbar-thumb { background: rgba(103, 75, 181, 0.1); border-radius: 10px; }
        .scroll-container::-webkit-scrollbar-thumb:hover { background: rgba(103, 75, 181, 0.2); }
    </style>
</head>
<body class="text-on-background antialiased">
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding py-md bg-white/60 backdrop-blur-xl border-b border-white/20">
<div class="flex items-center gap-md">
<span class="font-headline-lg text-headline-lg text-primary tracking-tight">Clarivue</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2 hidden md:block">
<h1 class="font-headline-md text-headline-md text-on-surface">Question History</h1>
</div>
<div class="flex items-center">
<button id="clear-btn" class="flex items-center gap-xs px-md py-sm rounded-full border border-outline/30 text-on-surface-variant font-label-md hover:bg-white/40 transition-colors active:scale-95">
<span class="material-symbols-outlined text-[20px]">delete_sweep</span>
<span>Clear History</span>
</button>
</div>
</header>
<main class="pt-[100px] pb-xl px-container-padding max-w-4xl mx-auto">
<div class="md:hidden mb-lg">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Question History</h1>
</div>
<div class="space-y-md scroll-container" id="history-feed">
<p class="text-center text-on-surface-variant py-xl">Loading history...</p>
</div>
<div class="fixed bottom-0 right-0 w-[500px] h-[500px] pointer-events-none z-[-1] opacity-40 blur-[100px] bg-secondary-container rounded-full translate-x-1/2 translate-y-1/2"></div>
</main>
<script>
        const feed = document.getElementById('history-feed');
        const clearBtn = document.getElementById('clear-btn');

        // Turns a real database timestamp into a friendly "2 hours ago" style label
        function timeAgo(timestamp) {
            const seconds = Math.floor((new Date() - new Date(timestamp)) / 1000);
            if (seconds < 60) return 'Just now';
            const minutes = Math.floor(seconds / 60);
            if (minutes < 60) return minutes + ' minute' + (minutes > 1 ? 's' : '') + ' ago';
            const hours = Math.floor(minutes / 60);
            if (hours < 24) return hours + ' hour' + (hours > 1 ? 's' : '') + ' ago';
            const days = Math.floor(hours / 24);
            if (days === 1) return 'Yesterday';
            if (days < 7) return days + ' days ago';
            return new Date(timestamp).toLocaleDateString();
        }

        function showEmptyState() {
            feed.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20 text-center">
                    <span class="material-symbols-outlined text-[64px] text-primary/30 mb-md">history</span>
                    <p class="font-headline-md text-on-surface-variant">Your history is clear</p>
                    <p class="font-body-md text-on-surface-variant/60">New insights will appear here as you ask questions.</p>
                </div>
            `;
        }

        async function loadHistory() {
            try {
                const response = await fetch('/history');
                const data = await response.json();

                if (!data.history || data.history.length === 0) {
                    showEmptyState();
                    return;
                }

                feed.innerHTML = data.history.map(item => `
                    <div class="glass-panel glass-card rounded-xl p-lg cursor-pointer group transition-all">
                        <div class="flex justify-between items-start mb-sm">
                            <h3 class="font-headline-md text-headline-md text-on-surface flex-1 pr-md">${item.question}</h3>
                            <span class="font-label-md text-on-surface-variant whitespace-nowrap opacity-60">${timeAgo(item.asked_at)}</span>
                        </div>
                        
                        <p class="font-body-md text-body-md text-on-surface-variant/80 line-clamp-2">${(item.explanation || '').replace(/\*\*/g, '')}</p>
                    </div>
                `).join('');
            } catch (err) {
                feed.innerHTML = `<p class="text-center text-error py-xl">Could not load history: ${err.message}</p>`;
            }
        }

        clearBtn.addEventListener('click', async () => {
            if (!confirm('Are you sure you want to clear your entire question history? This action cannot be undone.')) return;

            try {
                await fetch('/history', { method: 'DELETE' });
                feed.style.opacity = '0';
                feed.style.transition = 'opacity 0.3s ease-out';
                setTimeout(() => {
                    showEmptyState();
                    feed.style.opacity = '1';
                }, 300);
            } catch (err) {
                alert('Could not clear history: ' + err.message);
            }
        });

        loadHistory();
    </script>
</body></html>
